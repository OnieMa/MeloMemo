name: Build and Deploy Docker Image

# 触发条件：
# - main 分支有新提交时自动运行
# - 也可以在 GitHub Actions 页面手动触发 workflow_dispatch
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 权限说明：
# - contents: read 用于 checkout 代码
# - packages: write 用于把 Docker 镜像推送到 GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      # 输出给 deploy job 使用，避免部署阶段重复拼接镜像名。
      image: ${{ steps.image.outputs.image }}
      tag: ${{ github.sha }}
    steps:
      # 拉取仓库代码，Docker build 需要 Dockerfile、源码和 package-lock。
      - name: Check out repository
        uses: actions/checkout@v4

      # GHCR 要求镜像路径使用小写 owner。
      # 这里统一生成 ghcr.io/<owner>/melomemo，避免仓库 owner 大写导致推送失败。
      - name: Prepare image name
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/melomemo" >> "$GITHUB_OUTPUT"

      # 启用 Docker Buildx，支持缓存和更稳定的 BuildKit 构建。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GitHub Container Registry。
      # GITHUB_TOKEN 是 GitHub Actions 自动提供的 token，配合 packages: write 可推送镜像。
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送镜像。
      # 同时推两个 tag：
      # - latest: 方便服务器默认拉最新稳定版本
      # - commit sha: 精确部署某一次提交，方便回滚和排查
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.sha }}
          # 使用 GitHub Actions cache 加速后续镜像构建。
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Docker Host
    runs-on: ubuntu-latest
    needs: build
    env:
      # 服务器连接信息来自 GitHub repository secrets。
      # 最少需要 DEPLOY_HOST、DEPLOY_USER、DEPLOY_SSH_KEY 才会执行部署。
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/melomemo' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      # 如果 GHCR package 是私有的，服务器拉镜像需要 GHCR_TOKEN。
      # 如果镜像设为 public，可以不配置 GHCR_TOKEN。
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      # 部署精确到本次 commit tag，而不是 latest，避免 latest 缓存或并发构建造成歧义。
      MELOMEMO_IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}
    steps:
      # 拉取仓库，只是为了拿到 docker-compose.prod.yml 并复制到服务器。
      - name: Check out deployment files
        uses: actions/checkout@v4

      # 部署是可选的：
      # - 没配服务器 secrets 时，只构建并推送镜像
      # - 配齐服务器 secrets 后，才继续执行 SSH 部署
      - name: Check deployment secrets
        id: deploy_config
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped. Configure DEPLOY_HOST, DEPLOY_USER and DEPLOY_SSH_KEY repository secrets to enable remote Docker deployment."
          fi

      # 写入 SSH 私钥，并把服务器 host key 加入 known_hosts。
      # 这样后续 ssh/scp 不会卡在交互式确认。
      - name: Configure SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      # 把生产 compose 文件复制到服务器部署目录。
      # 注意：不会覆盖服务器上的 .env.docker，避免密钥被仓库文件替换。
      - name: Copy production compose file
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"

      # 远程部署步骤：
      # 1. 进入部署目录
      # 2. 如配置了 GHCR_TOKEN，则登录 GHCR
      # 3. 注入 MELOMEMO_IMAGE，让 compose 拉取本次 commit 对应镜像
      # 4. docker compose pull 拉镜像
      # 5. docker compose up -d 后台启动或滚动更新容器
      # 6. 清理无用旧镜像，减少服务器磁盘占用
      - name: Pull image and restart container
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' MELOMEMO_IMAGE='$MELOMEMO_IMAGE' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          if [ -n "${GHCR_TOKEN:-}" ]; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          export MELOMEMO_IMAGE
          docker compose pull
          docker compose up -d
          docker image prune -f
          REMOTE
