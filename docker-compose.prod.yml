services:
  melomemo:
    image: ${MELOMEMO_IMAGE:-ghcr.io/oniema/melomemo:latest}
    container_name: melomemo
    restart: unless-stopped
    ports:
      - "${MELOMEMO_PORT:-8787}:8787"
    env_file:
      - path: .env.docker
        required: false
    environment:
      API_PORT: "8787"
      DATABASE_URL: "file:/app/data/melomemo.db"
      APP_TIME_ZONE: "${APP_TIME_ZONE:-Asia/Shanghai}"
    volumes:
      - melomemo-data:/app/data
      - melomemo-uploads:/app/server/uploads
      - melomemo-dictionaries:/app/server/dictionaries

volumes:
  melomemo-data:
  melomemo-uploads:
  melomemo-dictionaries:
